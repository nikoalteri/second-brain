                    type: string
                    example: 'Server Error'
      tags:
        - 'Credit Cards'
    post:
      summary: ''
      operationId: postApiV1CreditCards
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Credit Cards @authenticated'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                account_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the accounts table.'
                  example: 16
                type:
                  type: string
                  description: ''
                  example: charge
                  enum:
                    - charge
                    - revolving
                credit_limit:
                  type: number
                  description: 'Must be at least 0.'
                  example: 39
                  nullable: true
                fixed_payment:
                  type: number
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                interest_rate:
                  type: number
                  description: 'Must be at least 0. Must not be greater than 100.'
                  example: 16
                  nullable: true
                stamp_duty_amount:
                  type: number
                  description: 'Must be at least 0.'
                  example: 77
                  nullable: true
                statement_day:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 31.'
                  example: 15
                due_day:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 31.'
                  example: 8
                skip_weekends:
                  type: boolean
                  description: ''
                  example: true
                current_balance:
                  type: number
                  description: 'Must be at least 0.'
                  example: 60
                  nullable: true
                status:
                  type: string
                  description: ''
                  example: active
                  enum:
                    - active
                    - suspended
                    - closed
                start_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-21T21:51:05'
                  nullable: true
                interest_calculation_method:
                  type: string
                  description: ''
                  example: direct_monthly
                  enum:
                    - daily_balance
                    - direct_monthly
                  nullable: true
              required:
                - name
                - account_id
                - type
                - statement_day
                - due_day
                - status
