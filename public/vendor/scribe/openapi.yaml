              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                account_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the accounts table.'
                  example: 16
                total_amount:
                  type: number
                  description: 'Must be at least 0.01.'
                  example: 39
                monthly_payment:
                  type: number
                  description: 'Must be at least 0.01.'
                  example: 84
                interest_rate:
                  type: number
                  description: 'Must be at least 0. Must not be greater than 100.'
                  example: 16
                  nullable: true
                is_variable_rate:
                  type: boolean
                  description: ''
                  example: true
                withdrawal_day:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 31.'
                  example: 17
                skip_weekends:
                  type: boolean
                  description: ''
                  example: false
                start_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-21T21:51:05'
                end_date:
                  type: string
                  description: 'Must be a valid date. Must be a date after or equal to <code>start_date</code>.'
                  example: '2052-05-14'
                  nullable: true
                total_installments:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
                paid_installments:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 84
                remaining_amount:
                  type: number
                  description: 'Must be at least 0.'
                  example: 12
                  nullable: true
                status:
                  type: string
                  description: ''
                  example: completed
                  enum:
                    - active
                    - completed
                    - defaulted
              required:
                - name
                - account_id
                - total_amount
                - monthly_payment
                - withdrawal_day
                - start_date
                - total_installments
                - paid_installments
                - status
