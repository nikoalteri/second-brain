openapi: 3.0.3
info:
  title: 'Fluxa Finance API'
  description: 'REST API for the Fluxa personal finance tracker. All endpoints require Bearer token authentication obtained via POST /api/v1/auth/login.'
  version: 1.0.0
servers:
  -
    url: 'https://second-brain.test'
tags:
  -
    name: Accounts
    description: ''
  -
    name: Authentication
    description: ''
  -
    name: 'Credit Cards'
    description: ''
  -
    name: 'Credit Cards @authenticated'
    description: ''
  -
    name: 'Credit Cards @authenticated @response 204 {}'
    description: ''
  -
    name: Loans
    description: ''
  -
    name: 'Loans @authenticated'
    description: ''
  -
    name: 'Loans @authenticated @response 204 {}'
    description: ''
  -
    name: Subscriptions
    description: ''
  -
    name: 'Subscriptions @authenticated'
    description: ''
  -
    name: 'Subscriptions @authenticated @response 204 {}'
    description: ''
  -
    name: Transactions
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via POST /api/v1/auth/login. Access tokens expire in 30 minutes.'
security:
  -
    default: []
paths:
  /api/v1/accounts:
    get:
      summary: 'List all accounts for the authenticated user.'
      operationId: listAllAccountsForTheAuthenticatedUser
      description: ''
      parameters:
        -
          in: query
          name: 'filter[type]'
          description: 'Filter by account type.'
          example: 0
          required: false
          schema:
            type: integer
            description: 'Filter by account type.'
            example: 0
        -
          in: query
          name: 'filter[is_active]'
          description: 'Filter by active status.'
          example: 'true'
          required: false
          schema:
            type: string
            description: 'Filter by active status.'
            example: 'true'
        -
          in: query
          name: 'filter[currency]'
          description: 'Filter by currency code.'
          example: EUR
          required: false
          schema:
            type: string
            description: 'Filter by currency code.'
            example: EUR
        -
          in: query
          name: sort
          description: 'Sort field (prefix - for descending).'
          example: '-balance'
          required: false
          schema:
            type: string
            description: 'Sort field (prefix - for descending).'
            example: '-balance'
        -
          in: query
          name: cursor
          description: 'Opaque cursor for pagination.'
          example: architecto
          required: false
          schema:
            type: string
            description: 'Opaque cursor for pagination.'
            example: architecto
        -
          in: query
          name: per_page
          description: 'Items per page (default 20).'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Items per page (default 20).'
            example: 20
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Server Error'
                properties:
                  message:
                    type: string
                    example: 'Server Error'
      tags:
        - Accounts
    post:
      summary: 'Create a new account.'
      operationId: createANewAccount
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                type:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: 'n'
                opening_balance:
                  type: number
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: zmi
                is_active:
                  type: boolean
                  description: ''
                  example: false
              required:
                - name
                - type
                - currency
  '/api/v1/accounts/{account_id}':
    get:
      summary: 'Get a single account.'
      operationId: getASingleAccount
      description: ''
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Server Error'
                properties:
                  message:
                    type: string
                    example: 'Server Error'
      tags:
        - Accounts
    put:
      summary: 'Update an account.'
      operationId: updateAnAccount
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Accounts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                type:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: 'n'
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: gzm
                is_active:
                  type: boolean
                  description: ''
                  example: true
    patch:
      summary: 'Update an account.'
      operationId: updateAnAccount
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Accounts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                type:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: 'n'
                currency:
                  type: string
                  description: 'Must be 3 characters.'
                  example: gzm
                is_active:
                  type: boolean
                  description: ''
                  example: true
    delete:
      summary: 'Delete an account.'
      operationId: deleteAnAccount
      description: ''
      parameters: []
      responses:
        204:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example: {  }
                properties: {  }
      tags:
        - Accounts
    parameters:
      -
        in: path
        name: account_id
        description: 'The ID of the account.'
        example: 16
        required: true
        schema:
          type: integer
      -
        in: path
        name: account
        description: 'The account ID.'
        example: 1
        required: true
        schema:
          type: integer
  /api/v1/auth/login:
    post:
      summary: 'Authenticate user and issue access + refresh tokens.'
      operationId: authenticateUserAndIssueAccess+RefreshTokens
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  access_token: 1|...
                  refresh_token: 2|...
                  token_type: Bearer
                  expires_in: 1800
                properties:
                  access_token:
                    type: string
                    example: 1|...
                  refresh_token:
                    type: string
                    example: 2|...
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 1800
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid credentials.'
                properties:
                  message:
                    type: string
                    example: 'Invalid credentials.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Validation failed.'
                  errors:
                    email:
                      - 'The email field is required.'
                properties:
                  message:
                    type: string
                    example: 'Validation failed.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'User email.'
                  example: user@example.com
                password:
                  type: string
                  description: 'User password (min 8 chars).'
                  example: secret1234
              required:
                - email
                - password
      security: []
  /api/v1/auth/refresh:
    post:
      summary: 'Refresh an expired access token using a valid refresh token.'
      operationId: refreshAnExpiredAccessTokenUsingAValidRefreshToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  access_token: 3|...
                  token_type: Bearer
                  expires_in: 1800
                properties:
                  access_token:
                    type: string
                    example: 3|...
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 1800
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/v1/auth/logout:
    post:
      summary: 'Logout user and invalidate all tokens.'
      operationId: logoutUserAndInvalidateAllTokens
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged out.'
                properties:
                  message:
                    type: string
                    example: 'Logged out.'
      tags:
        - Authentication
  /api/v1/credit-cards:
    get:
      summary: ''
      operationId: getApiV1CreditCards
      description: ''
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
