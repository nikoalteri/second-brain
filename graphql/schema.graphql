# ─── MUTATIONS ────────────────────────────────────────────────────────────────

type Mutation {
    "Create a new bank account."
    createAccount(input: CreateAccountInput! @spread): Account!
        @create @guard @inject(context: "user.id", name: "user_id")

    "Update an existing account."
    updateAccount(id: ID!, input: UpdateAccountInput! @spread): Account!
        @update @guard

    "Delete an account by ID."
    deleteAccount(id: ID!): Account
        @delete @guard

    "Create a new transaction."
    createTransaction(input: CreateTransactionInput! @spread): Transaction!
        @create @guard @inject(context: "user.id", name: "user_id")

    "Update an existing transaction."
    updateTransaction(id: ID!, input: UpdateTransactionInput! @spread): Transaction!
        @update @guard

    "Delete a transaction by ID."
    deleteTransaction(id: ID!): Transaction
        @delete @guard

    "Create a new loan."
    createLoan(input: CreateLoanInput! @spread): Loan!
        @create @guard @inject(context: "user.id", name: "user_id")

    "Update an existing loan."
    updateLoan(id: ID!, input: UpdateLoanInput! @spread): Loan!
        @update @guard

    "Delete a loan by ID."
    deleteLoan(id: ID!): Loan
        @delete @guard

    "Create a new credit card."
    createCreditCard(input: CreateCreditCardInput! @spread): CreditCard!
        @create @guard @inject(context: "user.id", name: "user_id")

    "Update an existing credit card."
    updateCreditCard(id: ID!, input: UpdateCreditCardInput! @spread): CreditCard!
        @update @guard

    "Delete a credit card by ID."
    deleteCreditCard(id: ID!): CreditCard
        @delete @guard

    "Create a new subscription."
    createSubscription(input: CreateSubscriptionInput! @spread): ServiceSubscription!
        @create(model: "Subscription") @guard @inject(context: "user.id", name: "user_id")

    "Update an existing subscription."
    updateSubscription(id: ID!, input: UpdateSubscriptionInput! @spread): ServiceSubscription!
        @update(model: "Subscription") @guard

    "Delete a subscription by ID."
    deleteSubscription(id: ID!): ServiceSubscription
        @delete(model: "Subscription") @guard
}

"Account of a person who uses this application."
type User {
    "Unique primary key."
    id: ID!

    "Non-unique name."
    name: String!

    "Unique email address."
    email: String!

    "When the email was verified."
    email_verified_at: DateTime

    "When the account was created."
    created_at: DateTime!

    "When the account was last updated."
    updated_at: DateTime!
}
